<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Meski Shop Pro</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #0b1220;
  color: #e5e7eb;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 1200px;
  margin: auto;
}

.header {
  background: linear-gradient(135deg, #06b6d4, #3b82f6);
  padding: 25px;
  text-align: center;
  border-radius: 12px;
}

.dashboard {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px,1fr));
  gap: 10px;
  margin: 20px 0;
}

.card {
  background: #1e293b;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
}

form {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 20px;
}

input, select {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #334155;
  background: #0f172a;
  color: white;
  flex: 1;
}

button {
  background: #06b6d4;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

button:hover { background: #0284c7; }

.remove { background: red; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(230px,1fr));
  gap: 20px;
}

.product {
  background: #1e293b;
  border-radius: 12px;
  text-align: center;
  padding-bottom: 10px;
}

.product img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.low {
  border: 2px solid orange;
}
</style>

</head>

<body>

<div class="container">

<div class="header">
  <h1>Meski Shop</h1>
  <p>Inventory System</p>
</div>

<div class="dashboard">
  <div class="card">Products: <h2 id="totalProducts">0</h2></div>
  <div class="card">Stock: <h2 id="totalStock">0</h2></div>
  <div class="card">Sold: <h2 id="totalSold">0</h2></div>
  <div class="card">Profit: <h2 id="totalProfit">$0</h2></div>
</div>

<input type="text" id="search" placeholder="Search..." oninput="render()">

<form id="form">
  <input type="text" id="name" placeholder="Product name" required>
  <input type="number" id="buyPrice" placeholder="Buying Price" required>
  <input type="number" id="sellPrice" placeholder="Selling Price" required>
  <input type="number" id="qty" placeholder="Quantity" required>

  <select id="category">
    <option>Electronics</option>
    <option>Clothes</option>
    <option>Accessories</option>
    <option>Other</option>
  </select>

  <input type="file" id="image" accept="image/*">

  <button type="submit">Add</button>
</form>

<div id="grid" class="grid"></div>

</div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];

function save(){
  localStorage.setItem("products", JSON.stringify(products));
}

function toBase64(file){
  return new Promise((res, rej)=>{
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = ()=>res(reader.result);
    reader.onerror = rej;
  });
}

const form = document.getElementById("form");
const name = document.getElementById("name");
const buyPrice = document.getElementById("buyPrice");
const sellPrice = document.getElementById("sellPrice");
const qty = document.getElementById("qty");
const category = document.getElementById("category");
const image = document.getElementById("image");

form.onsubmit = async (e)=>{
  e.preventDefault();

  if(!name.value || !buyPrice.value || !sellPrice.value || !qty.value){
    alert("Please fill all fields");
    return;
  }

  let img = "https://via.placeholder.com/220x150";

  if(image.files[0]){
    img = await toBase64(image.files[0]);
  }

  products.push({
    id: Date.now(),
    name: name.value.trim(),
    buyPrice: Number(buyPrice.value),
    sellPrice: Number(sellPrice.value),
    total: Number(qty.value),
    sold: 0,
    category: category.value,
    image: img
  });

  form.reset();
  save();
  render();
};

function sell(id){
  const p = products.find(x=>x.id===id);
  if(p && p.sold < p.total){
    p.sold++;
    save();
    render();
  } else {
    alert("No stock left!");
  }
}

function removeItem(id){
  products = products.filter(x=>x.id!==id);
  save();
  render();
}

function render(){
  const grid = document.getElementById("grid");
  const search = document.getElementById("search").value.toLowerCase();

  grid.innerHTML = "";

  let totalStock = 0;
  let totalSold = 0;
  let totalProfit = 0;

  products
  .filter(p => (p.name || "").toLowerCase().includes(search))
  .forEach(p=>{

    const remaining = p.total - p.sold;
    const profit = (p.sellPrice - p.buyPrice) * p.sold;

    totalStock += p.total;
    totalSold += p.sold;
    totalProfit += profit;

    const div = document.createElement("div");
    div.className = "product" + (remaining <= 3 && remaining > 0 ? " low" : "");

    div.innerHTML = `
      <img src="${p.image}">
      <h3>${p.name}</h3>
      <p>${p.category}</p>

      <p>Buy: $${p.buyPrice}</p>
      <p>Sell: $${p.sellPrice}</p>

      <p>Total: ${p.total}</p>
      <p>Sold: ${p.sold}</p>
      <p>Remaining: ${remaining}</p>

      <p>Profit: $${profit.toFixed(2)}</p>

      <button onclick="sell(${p.id})" ${remaining===0?"disabled":""}>
        Sell
      </button>

      <button class="remove" onclick="removeItem(${p.id})">
        Delete
      </button>
    `;

    grid.appendChild(div);
  });

  document.getElementById("totalProducts").innerText = products.length;
  document.getElementById("totalStock").innerText = totalStock;
  document.getElementById("totalSold").innerText = totalSold;
  document.getElementById("totalProfit").innerText = "$" + totalProfit.toFixed(2);
}

render();
</script>

</body>
</html>
