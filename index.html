<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Meski Shop - Inventory</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: #0f172a;
  margin: 0;
  padding: 20px;
  color: #e5e7eb;
}

.container {
  max-width: 1100px;
  margin: auto;
}

/* Header */
.header {
  background: linear-gradient(135deg, #06b6d4, #3b82f6);
  color: white;
  padding: 25px;
  text-align: center;
  border-radius: 12px;
  margin-bottom: 20px;
}

/* Card */
.card {
  background: #1e293b;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}

/* Controls */
.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

/* Inputs */
input, select {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #334155;
  background: #0f172a;
  color: white;
  flex: 1;
}

input::placeholder {
  color: #94a3b8;
}

input:focus, select:focus {
  border-color: #06b6d4;
  box-shadow: 0 0 0 2px rgba(6,182,212,0.3);
}

/* Buttons */
button {
  background: #06b6d4;
  color: white;
  border: none;
  padding: 10px 14px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  background: #0284c7;
  transform: scale(1.05);
}

.remove {
  background: #ef4444;
}

.remove:hover {
  background: #dc2626;
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px,1fr));
  gap: 20px;
}

/* Product */
.product {
  background: #1e293b;
  border-radius: 12px;
  overflow: hidden;
  text-align: center;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  transition: 0.2s;
}

.product:hover {
  transform: translateY(-6px);
}

.product img {
  width: 100%;
  height: 150px;
  object-fit: cover;
}

.status {
  font-weight: bold;
}

.available { color: #22c55e; }
.sold { color: #ef4444; }

.category {
  color: white;
  padding: 3px 6px;
  border-radius: 5px;
  display: inline-block;
  font-size: 12px;
}
</style>

</head>
<body>

<div class="container">

<div class="header">
  <h1>Meski Shop</h1>
  <p>Inventory Management System</p>
</div>

<div class="card">
  <div class="controls">
    <input type="text" id="search" placeholder="Search...">
    <label><input type="checkbox" id="availableOnly"> Available</label>
    <select id="categoryFilter">
      <option value="">All Categories</option>
    </select>
  </div>
</div>

<div class="card">
  <form id="addForm" class="controls">
    <input type="text" id="newName" placeholder="Product name" required>
    <input type="text" id="newPrice" placeholder="Price" required>
    <select id="newCategory" required>
      <option value="">Category</option>
      <option>Electronics</option>
      <option>Clothes</option>
      <option>Accessories</option>
      <option>Other</option>
    </select>
    <input type="file" id="newImage" accept="image/*">
    <button type="submit">Add</button>
  </form>
</div>

<div id="productGrid" class="grid"></div>

</div>

<script>
let products = JSON.parse(localStorage.getItem('products')) || [];

const productGrid = document.getElementById('productGrid');

function save() {
  localStorage.setItem('products', JSON.stringify(products));
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => res(reader.result);
    reader.onerror = rej;
  });
}

function getColor(cat){
  return {
    Electronics:"#3b82f6",
    Clothes:"#f97316",
    Accessories:"#a855f7",
    Other:"#6b7280"
  }[cat] || "#6b7280";
}

function render(){
  productGrid.innerHTML = "";

  if(products.length === 0){
    productGrid.innerHTML = "<p>No products yet</p>";
    return;
  }

  products.forEach(p=>{
    const div = document.createElement("div");
    div.className = "product";

    div.innerHTML = `
      <img src="${p.image}">
      <h3>${p.name}</h3>
      <p class="category" style="background:${getColor(p.category)}">${p.category}</p>
      <p>${p.price}</p>
      <p class="status ${p.status==='Available'?'available':'sold'}">${p.status}</p>
      <button onclick="sell(${p.id})">Sell</button>
      <button class="remove" onclick="removeItem(${p.id})">Remove</button>
    `;

    productGrid.appendChild(div);
  });
}

function sell(id){
  const p = products.find(x=>x.id===id);
  if(p){ p.status="Sold"; save(); render(); }
}

function removeItem(id){
  products = products.filter(x=>x.id!==id);
  save();
  render();
}

document.getElementById("addForm").addEventListener("submit", async e=>{
  e.preventDefault();

  const name = newName.value;
  const price = newPrice.value;
  const category = newCategory.value;
  const file = newImage.files[0];

  let image = "https://via.placeholder.com/220x150?text="+name;

  if(file){
    image = await toBase64(file);
  }

  products.push({
    id: Date.now(),
    name,
    price,
    category,
    status:"Available",
    image
  });

  addForm.reset();
  save();
  render();
});

render();
</script>

</body>
</html>
